<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>When Compassion Costs You Sleep - FLC Publishing House</title>
  <meta name="description" content="Redirecting to the Contentful-powered sermon post." />
  <link rel="icon" type="image/png" href="../assets/images/Dark_Logo-removebg-preview.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #0f2838 0%, #1a3a52 55%, #173548 100%);
      color: #fff;
      text-align: center;
      padding: 1.25rem;
    }
    .card {
      max-width: 38rem;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 1.4rem 1.25rem;
    }
    .title {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 0.65rem;
    }
    .text {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
    }
    .link {
      color: #d5bc96;
      font-weight: 600;
      text-decoration: none;
    }
    .link:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Opening Sermon...</h1>
    <p id="statusText" class="text">Looking up this sermon in Contentful.</p>
    <p class="text" style="margin-top:0.8rem;">
      If you are not redirected, open
      <a class="link" href="../pages/resources.html">Resources</a>.
    </p>
  </main>

  <script>
    const TARGET_TITLE = "When Compassion Costs You Sleep";
    const cfg = {
      spaceId: "i8pstcwrkztq",
      environment: "master",
      accessToken: "pLj1jC1-l70jtAmGBWhrexrKWRbaLwKVtOHjpMVXzLw",
      contentType: "blogPage",
      postPagePath: "../pages/post.html"
    };

    function normalize(text) {
      return String(text || "").trim().toLowerCase();
    }

    async function goToContentfulPost() {
      const statusText = document.getElementById("statusText");
      const params = new URLSearchParams({
        access_token: cfg.accessToken,
        content_type: cfg.contentType,
        "fields.title[match]": TARGET_TITLE,
        limit: "10"
      });
      const endpoint = `https://cdn.contentful.com/spaces/${cfg.spaceId}/environments/${cfg.environment}/entries?${params.toString()}`;

      try {
        const response = await fetch(endpoint, { headers: { Accept: "application/json" } });
        if (!response.ok) throw new Error(`Request failed: ${response.status}`);
        const payload = await response.json();
        const items = Array.isArray(payload.items) ? payload.items : [];

        const exact = items.find((item) => normalize(item?.fields?.title) === normalize(TARGET_TITLE));
        const matched = exact || items[0];

        if (matched && matched.sys && matched.sys.id) {
          const href = `${cfg.postPagePath}?entry=${encodeURIComponent(matched.sys.id)}`;
          window.location.replace(href);
          return;
        }

        statusText.textContent = "No matching Contentful post found yet. Publish this sermon in Contentful to enable redirect.";
      } catch (error) {
        statusText.textContent = "Could not reach Contentful right now. Please open Resources and try again.";
      }
    }

    goToContentfulPost();
  </script>
</body>
</html>
