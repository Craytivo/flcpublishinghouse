<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Uncommon Provision - Spiritual Detox Week 2</title>
  <meta name="description" content="Redirecting to Contentful-powered Detox Week 2 post." />
  <link rel="icon" type="image/png" href="../assets/images/Dark_Logo-removebg-preview.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #0f2838 0%, #1a3a52 55%, #173548 100%);
      color: #fff;
      text-align: center;
      padding: 1.25rem;
    }
    .card {
      max-width: 40rem;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 1.4rem 1.25rem;
    }
    .title {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 0.65rem;
    }
    .text {
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
    }
    .link {
      color: #d5bc96;
      font-weight: 600;
      text-decoration: none;
    }
    .link:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Opening Detox Week 2...</h1>
    <p id="statusText" class="text">Looking up the Contentful post by slug.</p>
    <p class="text" style="margin-top:0.8rem;">
      If you are not redirected, open
      <a class="link" href="../pages/resources.html">Resources</a>.
    </p>
  </main>

  <script>
    const TARGET_SLUG = "uncommon-provision";
    const cfg = {
      spaceId: "i8pstcwrkztq",
      environment: "master",
      accessToken: "pLj1jC1-l70jtAmGBWhrexrKWRbaLwKVtOHjpMVXzLw",
      contentTypes: ["detoxPost", "blogPage"],
      postPagePath: "../pages/post.html"
    };

    async function fetchByType(contentType) {
      const params = new URLSearchParams({
        access_token: cfg.accessToken,
        content_type: contentType,
        "fields.slug[match]": TARGET_SLUG,
        limit: "10"
      });
      const endpoint = `https://cdn.contentful.com/spaces/${cfg.spaceId}/environments/${cfg.environment}/entries?${params.toString()}`;
      try {
        const response = await fetch(endpoint, { headers: { Accept: "application/json" } });
        if (!response.ok) return null;
        const payload = await response.json();
        const items = Array.isArray(payload.items) ? payload.items : [];
        const exact = items.find((item) => String(item?.fields?.slug || "").trim().toLowerCase() === TARGET_SLUG);
        return exact || items[0] || null;
      } catch (error) {
        return null;
      }
    }

    async function goToDetoxPost() {
      const statusText = document.getElementById("statusText");

      try {
        const types = Array.isArray(cfg.contentTypes) ? cfg.contentTypes : [];
        let matched = null;
        for (const type of types) {
          matched = await fetchByType(type);
          if (matched && matched.sys && matched.sys.id) break;
        }

        if (matched && matched.sys && matched.sys.id) {
          const href = `${cfg.postPagePath}?entry=${encodeURIComponent(matched.sys.id)}`;
          window.location.replace(href);
          return;
        }

        statusText.textContent = "No matching detox post found. Confirm slug and publish status in Contentful.";
      } catch (error) {
        statusText.textContent = "Could not reach Contentful right now. Please open Resources and try again.";
      }
    }

    goToDetoxPost();
  </script>
</body>
</html>
